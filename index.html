<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Картошечный Скандал</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fcb69f">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .screen {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .hidden { display: none; }

        /* Главный экран */
        .fries-image {
            text-align: center;
            margin: 20px 0;
        }
        .fries-image span {
            font-size: 120px;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.05s linear;
        }
        .fries-image span:active { transform: scale(0.96); }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 30px;
            margin: 10px 0;
            font-weight: bold;
        }

        .main-menu {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 15px;
        }
        .menu-btn {
            background: #fff;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .menu-btn:active { transform: scale(0.97); }

        .telegram-link {
            background: #0088cc;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
        }

        /* Магазин */
        .shop-item {
            background: white;
            margin: 12px 0;
            padding: 15px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .effect-badge {
            font-size: 24px;
            margin-right: 10px;
        }
        button {
            background: #34c759;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }

        h2 { margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Главный экран -->
    <div id="mainScreen" class="screen">
        <div class="fries-image">
            <span id="clickArea">🍟</span>
        </div>
        <div class="stats">
            <span>🍟 <span id="fries">0</span></span>
            <span>⭐ <span id="premium">0</span></span>
            <span>⚡ <span id="clicksPerSec">0</span>/сек</span>
            <span>💪 +<span id="clickPower">1</span></span>
        </div>
        <div class="main-menu">
            <button class="menu-btn" id="openShopBtn">🛒 магазин</button>
            <button class="menu-btn" id="openFoodcourtBtn">🍽️ фудкорт</button>
            <button class="menu-btn" id="openSettingsBtn">⚙️ настройки</button>
        </div>
        <div class="telegram-link" id="telegramBtn">📱 наш Telegram канал</div>
    </div>

    <!-- Магазин (второй экран) -->
    <div id="shopScreen" class="screen hidden">
        <h2>🛍️ магазин</h2>
        <div class="shop-item" data-effect="crown">
            <div><span class="effect-badge">👑</span> летающие короны</div>
            <button class="buyEffectBtn">🍟 200</button>
        </div>
        <div class="shop-item" data-effect="fries">
            <div><span class="effect-badge">🍟</span> летающая картошка</div>
            <button class="buyEffectBtn">🍟 400</button>
        </div>
        <div class="shop-item" data-effect="dollar">
            <div><span class="effect-badge">💵</span> летающие доллары</div>
            <button class="buyEffectBtn">🍟 500</button>
        </div>
        <div class="shop-item">
            <div>🤖 автокликер<br>📈 уровень <span id="autoLevel">0</span> → +<span id="autoIncome">0</span>/сек</div>
            <button id="buyAutoBtn">🍟 <span id="autoCost">50</span></button>
        </div>
        <button id="backFromShop" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>

    <!-- Фудкорт (заглушка) -->
    <div id="foodcourtScreen" class="screen hidden">
        <h2>🍽️ фудкорт</h2>
        <div class="shop-item">
            <div>😂 смешно пошутить (раз в день)</div>
            <button id="jokeBtn">+250🍟</button>
        </div>
        <div class="shop-item">
            <div>🍟 съесть картошку (раз в 3 минуты)</div>
            <button id="eatBtn">+1💪</button>
        </div>
        <div id="foodcourtMessage" class="stats" style="margin-top:15px">нажми на кнопку</div>
        <button id="backFromFoodcourt" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>

    <!-- Настройки (заглушка) -->
    <div id="settingsScreen" class="screen hidden">
        <h2>⚙️ настройки</h2>
        <div class="shop-item">
            <span>🎨 тема</span>
            <div>
                <button id="themeYellow">жёлтая</button>
                <button id="themeGreen">зелёная</button>
                <button id="themeBlue">голубая</button>
            </div>
        </div>
        <button id="backFromSettings" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>
</div>

<script>
    // ---------- ИГРОВОЕ СОСТОЯНИЕ ----------
    let game = {
        fries: 100,
        premium: 0,
        clickPower: 1,
        autoLevel: 0,
        autoIncome: 0,
        lastTimestamp: Date.now(),
        lastClickSound: 0,
        effects: {
            crown: false,
            fries: false,
            dollar: false
        },
        jokeCooldown: 0,
        eatCooldown: 0
    };

    // Прогрессия автокликера: 1 → 5 → 10 → 40
    const autoIncomeMap = [0, 1, 5, 10, 40];
    function updateAutoIncome() {
        game.autoIncome = autoIncomeMap[game.autoLevel] || 40;
        document.getElementById('autoIncome').innerText = game.autoIncome;
        document.getElementById('clicksPerSec').innerText = game.autoIncome;
        document.getElementById('autoLevel').innerText = game.autoLevel;
    }

    function getAutoCost() {
        return Math.floor(50 * Math.pow(1.8, game.autoLevel));
    }

    function updateUI() {
        document.getElementById('fries').innerText = Math.floor(game.fries);
        document.getElementById('premium').innerText = Math.floor(game.premium);
        document.getElementById('clickPower').innerText = game.clickPower;
        document.getElementById('autoCost').innerText = getAutoCost();
    }

    function saveGame() {
        localStorage.setItem('clickerGame', JSON.stringify(game));
    }

    function loadGame() {
        const saved = localStorage.getItem('clickerGame');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                game = { ...game, ...data };
                updateAutoIncome();
            } catch(e) {}
        }
        updateUI();
    }

    // Пассивный доход
    function updatePassiveIncome() {
        const now = Date.now();
        const delta = Math.min(0.5, (now - game.lastTimestamp) / 1000);
        if (delta > 0 && game.autoIncome > 0) {
            game.fries += game.autoIncome * delta;
            updateUI();
        }
        game.lastTimestamp = now;
    }

    // Звук с таймаутом 1 сек
    function playClickSound() {
        const now = Date.now();
        if (now - game.lastClickSound < 1000) return;
        game.lastClickSound = now;
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 900;
            gain.gain.value = 0.08;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.12);
            osc.stop(audioCtx.currentTime + 0.12);
            audioCtx.resume();
        } catch(e) {}
    }

    // Партиклы эффектов
    function spawnParticles() {
        const activeEffects = [];
        if (game.effects.crown) activeEffects.push('👑');
        if (game.effects.fries) activeEffects.push('🍟');
        if (game.effects.dollar) activeEffects.push('💵');
        if (activeEffects.length === 0) return;

        const effect = activeEffects[Math.floor(Math.random() * activeEffects.length)];
        const particle = document.createElement('div');
        particle.innerText = effect;
        particle.style.position = 'fixed';
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.bottom = '60px';
        particle.style.fontSize = '28px';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '9999';
        particle.style.transition = 'all 0.8s ease-out';
        document.body.appendChild(particle);
        requestAnimationFrame(() => {
            particle.style.transform = 'translateY(-180px)';
            particle.style.opacity = '0';
        });
        setTimeout(() => particle.remove(), 800);
    }

    // Клик по картошке
    function clickHandler() {
        let gain = game.clickPower;
        game.fries += gain;
        let premiumGain = Math.floor(gain / 80);
        if (premiumGain > 0) game.premium += premiumGain;
        updateUI();
        playClickSound();
        spawnParticles();
        saveGame();
    }

    // ---------- МАГАЗИН ----------
    function buyEffect(effectName, price) {
        if (game.fries >= price) {
            game.fries -= price;
            game.effects[effectName] = true;
            alert(`Эффект ${effectName} активирован!`);
            updateUI();
            saveGame();
        } else {
            alert("Не хватает картошек!");
        }
    }

    function buyAutoClicker() {
        let cost = getAutoCost();
        if (game.fries >= cost) {
            game.fries -= cost;
            if (game.autoLevel < 4) game.autoLevel++;
            updateAutoIncome();
            updateUI();
            saveGame();
        } else {
            alert("Не хватает картошек!");
        }
    }

    // ---------- ФУДКОРТ ----------
    function makeJoke() {
        const now = Date.now();
        if (now < game.jokeCooldown) {
            const hours = Math.ceil((game.jokeCooldown - now) / 3600000);
            document.getElementById('foodcourtMessage').innerHTML = `⏰ шутить раз в день. осталось ~${hours} ч.`;
            return;
        }
        const isFunny = Math.random() < 0.5;
        if (isFunny) {
            game.fries += 250;
            document.getElementById('foodcourtMessage').innerHTML = '😂 ха-ха! +250 картошек!';
        } else {
            document.getElementById('foodcourtMessage').innerHTML = '😐 ты не умеешь шутить, это не твое.';
        }
        game.jokeCooldown = now + 24 * 60 * 60 * 1000;
        updateUI();
        saveGame();
    }

    function eatFries() {
        const now = Date.now();
        if (now < game.eatCooldown) {
            const minutes = Math.ceil((game.eatCooldown - now) / 60000);
            document.getElementById('foodcourtMessage').innerHTML = `⏰ съесть картошку раз в 3 минуты. осталось ${minutes} мин.`;
            return;
        }
        game.clickPower++;
        document.getElementById('foodcourtMessage').innerHTML = `🍟 вкусно! сила клика +1 (теперь ${game.clickPower})`;
        game.eatCooldown = now + 3 * 60 * 1000;
        updateUI();
        saveGame();
    }

    // ---------- НАСТРОЙКИ ТЕМ ----------
    function setTheme(theme) {
        const body = document.body;
        if (theme === 'yellow') body.style.background = 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)';
        if (theme === 'green') body.style.background = 'linear-gradient(135deg, #e4f5d4 0%, #b8e1a0 100%)';
        if (theme === 'blue') body.style.background = 'linear-gradient(135deg, #d4e4ff 0%, #a0c4ff 100%)';
        localStorage.setItem('gameTheme', theme);
    }

    function loadTheme() {
        const theme = localStorage.getItem('gameTheme');
        if (theme) setTheme(theme);
    }

    // ---------- НАВИГАЦИЯ ----------
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    window.onload = () => {
        loadGame();
        loadTheme();
        updateAutoIncome();
        updateUI();

        setInterval(() => {
            updatePassiveIncome();
            saveGame();
        }, 500);

        // Главный экран
        document.getElementById('clickArea').onclick = clickHandler;
        document.getElementById('openShopBtn').onclick = () => showScreen('shopScreen');
        document.getElementById('openFoodcourtBtn').onclick = () => showScreen('foodcourtScreen');
        document.getElementById('openSettingsBtn').onclick = () => showScreen('settingsScreen');
        document.getElementById('telegramBtn').onclick = () => window.open('https://t.me/hioly3', '_blank');

        // Магазин
        document.getElementById('backFromShop').onclick = () => showScreen('mainScreen');
        document.getElementById('buyAutoBtn').onclick = buyAutoClicker;
        const effectBtns = document.querySelectorAll('.buyEffectBtn');
        const effects = ['crown', 'fries', 'dollar'];
        const prices = [200, 400, 500];
        effectBtns.forEach((btn, idx) => {
            btn.onclick = () => buyEffect(effects[idx], prices[idx]);
        });

        // Фудкорт
        document.getElementById('backFromFoodcourt').onclick = () => showScreen('mainScreen');
        document.getElementById('jokeBtn').onclick = makeJoke;
        document.getElementById('eatBtn').onclick = eatFries;

        // Настройки
        document.getElementById('backFromSettings').onclick = () => showScreen('mainScreen');
        document.getElementById('themeYellow').onclick = () => setTheme('yellow');
        document.getElementById('themeGreen').onclick = () => setTheme('green');
        document.getElementById('themeBlue').onclick = () => setTheme('blue');
    };
</script>
</body>
</html>
