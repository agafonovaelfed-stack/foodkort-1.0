<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Картошечный Скандал</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5a623">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5a623;
            transition: background 0.3s, font-family 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Темы */
        body.theme-warm-yellow { background: linear-gradient(135deg, #ffecd2, #fcb69f); }
        body.theme-warm-green { background: linear-gradient(135deg, #e4f5d4, #b8e1a0); }
        body.theme-cool-blue { background: linear-gradient(135deg, #d4e4ff, #a0c4ff); }

        /* Шрифты */
        body.font-normal { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body.font-bold { font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; font-weight: bold; }
        body.font-italic { font-family: 'Georgia', 'Times New Roman', serif; font-style: italic; }
        body.font-bold-italic { font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; font-style: italic; }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* Главный экран */
        .screen {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none; }

        /* Картошка фри */
        .fries-image {
            text-align: center;
            margin: 20px 0;
        }
        .fries-image span {
            font-size: 120px;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.05s linear;
        }
        .fries-image span:active { transform: scale(0.96); }

        /* Меню на главном */
        .main-menu {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 15px;
        }
        .menu-btn {
            background: #fff;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            flex: 1;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .menu-btn:active { transform: scale(0.97); }

        /* Карточки статистики */
        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 30px;
            margin: 10px 0;
            font-weight: bold;
        }

        /* Магазин, настройки, фудкорт */
        .shop-item, .setting-item {
            background: white;
            margin: 12px 0;
            padding: 15px;
            border-radius: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .effect-badge {
            font-size: 24px;
            margin-right: 10px;
        }
        button {
            background: #34c759;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        .foodcourt-buttons {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        .foodcourt-buttons button {
            flex: 1;
            background: #ff9500;
        }
        .message-area {
            background: #e9ecef;
            padding: 12px;
            border-radius: 20px;
            margin: 15px 0;
            text-align: center;
            font-size: 14px;
        }
        .telegram-link {
            background: #0088cc;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body class="theme-warm-yellow font-normal">
<div class="app-container">
    <!-- Главный экран -->
    <div id="mainScreen" class="screen">
        <div class="fries-image">
            <span id="clickArea">🍟</span>
        </div>
        <div class="stats">
            <span>🍟 <span id="fries">0</span></span>
            <span>⭐ <span id="premium">0</span></span>
            <span>⚡ <span id="clicksPerSec">0</span>/сек</span>
            <span>📈 ур. <span id="tapLevel">1</span></span>
        </div>
        <div class="main-menu">
            <button class="menu-btn" id="openShopBtn">🛒 магазин</button>
            <button class="menu-btn" id="openFoodcourtBtn">🍽️ фудкорт</button>
            <button class="menu-btn" id="openSettingsBtn">⚙️ настройки</button>
        </div>
        <div class="telegram-link" id="telegramBtn">📱 наш Telegram канал</div>
    </div>

    <!-- Магазин -->
    <div id="shopScreen" class="screen hidden">
        <h2>🛍️ магазин эффектов</h2>
        <div class="shop-item" data-effect="crown">
            <div><span class="effect-badge">👑</span> летающие короны</div>
            <button class="buyEffectBtn">🍟 200</button>
        </div>
        <div class="shop-item" data-effect="fries">
            <div><span class="effect-badge">🍟</span> летающая картошка</div>
            <button class="buyEffectBtn">🍟 400</button>
        </div>
        <div class="shop-item" data-effect="dollar">
            <div><span class="effect-badge">💵</span> летающие доллары</div>
            <button class="buyEffectBtn">🍟 500</button>
        </div>
        <div class="shop-item">
            <div>🤖 автокликер (уровень <span id="autoLevel">0</span>)<br>📈 +<span id="autoIncome">0</span> карт/сек</div>
            <button id="buyAutoBtn">🍟 <span id="autoCost">50</span></button>
        </div>
        <button id="backFromShop" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>

    <!-- Фудкорт -->
    <div id="foodcourtScreen" class="screen hidden">
        <h2>🍽️ фудкорт</h2>
        <div class="foodcourt-buttons">
            <button id="jokeBtn">😂 смешно пошутить</button>
            <button id="eatFriesBtn">🍟 съесть картошку</button>
        </div>
        <div id="foodcourtMessage" class="message-area">нажми на кнопку</div>
        <button id="backFromFoodcourt" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>

    <!-- Настройки -->
    <div id="settingsScreen" class="screen hidden">
        <h2>⚙️ настройки</h2>
        <div class="setting-item">
            <span>🎨 тема</span>
            <div>
                <button id="themeYellow">жёлтая</button>
                <button id="themeGreen">зелёная</button>
                <button id="themeBlue">голубая</button>
            </div>
        </div>
        <div class="setting-item">
            <span>🔤 шрифт</span>
            <div>
                <button id="fontNormal">обычный</button>
                <button id="fontBold">жирный</button>
                <button id="fontItalic">курсив</button>
                <button id="fontBoldItalic">жирный курсив</button>
            </div>
        </div>
        <button id="backFromSettings" class="menu-btn" style="margin-top:20px">← назад</button>
    </div>
</div>

<script>
    // ---------- ИГРОВОЕ СОСТОЯНИЕ ----------
    let game = {
        fries: 100,
        premium: 0,
        autoLevel: 0,
        tapLevel: 1,
        clickPower: 1,
        autoIncome: 0,
        lastTimestamp: Date.now(),
        jokeCooldown: 0,    // timestamp когда можно снова
        eatCooldown: 0,
        effects: {
            crown: false,
            fries: false,
            dollar: false
        },
        autoCost: 50
    };

    // Автокликер даёт: 1, 5, 10, 40...
    const autoIncomeMap = [0, 1, 5, 10, 40];
    function updateAutoIncome() {
        if (game.autoLevel >= autoIncomeMap.length) game.autoIncome = 40;
        else game.autoIncome = autoIncomeMap[game.autoLevel];
        document.getElementById('autoIncome').innerText = game.autoIncome;
        document.getElementById('clicksPerSec').innerText = game.autoIncome;
        document.getElementById('autoLevel').innerText = game.autoLevel;
    }

    // Стоимость автокликера растёт
    function getAutoCost() {
        return Math.floor(50 * Math.pow(1.8, game.autoLevel));
    }

    // Пассивный доход
    function updatePassiveIncome() {
        const now = Date.now();
        const delta = Math.min(0.5, (now - game.lastTimestamp) / 1000);
        if (delta > 0) {
            let gain = game.autoIncome * delta;
            if (gain > 0) {
                game.fries += gain;
                updateUI();
            }
        }
        game.lastTimestamp = now;
    }

    // Обновление интерфейса
    function updateUI() {
        document.getElementById('fries').innerText = Math.floor(game.fries);
        document.getElementById('premium').innerText = Math.floor(game.premium);
        document.getElementById('tapLevel').innerText = game.tapLevel;
        document.getElementById('clickPower').innerText = game.clickPower;
        document.getElementById('autoCost').innerText = getAutoCost();
        document.getElementById('autoLevel').innerText = game.autoLevel;
        document.getElementById('autoIncome').innerText = game.autoIncome;
        document.getElementById('clicksPerSec').innerText = game.autoIncome;
    }

    // Сохранение
    function saveGame() {
        localStorage.setItem('clickerGame', JSON.stringify(game));
    }
    function loadGame() {
        const saved = localStorage.getItem('clickerGame');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                game = { ...game, ...data };
                updateAutoIncome();
            } catch(e) {}
        }
        updateUI();
    }

    // Клик по картошке
    function clickHandler() {
        let gain = game.clickPower;
        game.fries += gain;
        let premiumGain = Math.floor(gain / 80);
        if (premiumGain > 0) game.premium += premiumGain;
        updateUI();
        playSound();
        spawnParticles();
        saveGame();
    }

    // Партиклы в зависимости от купленных эффектов
    function spawnParticles() {
        const activeEffects = [];
        if (game.effects.crown) activeEffects.push('👑');
        if (game.effects.fries) activeEffects.push('🍟');
        if (game.effects.dollar) activeEffects.push('💵');
        if (activeEffects.length === 0) return;

        const effect = activeEffects[Math.floor(Math.random() * activeEffects.length)];
        const particle = document.createElement('div');
        particle.innerText = effect;
        particle.style.position = 'fixed';
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.bottom = '50px';
        particle.style.fontSize = '28px';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '9999';
        particle.style.transition = 'all 1s ease-out';
        document.body.appendChild(particle);
        requestAnimationFrame(() => {
            particle.style.transform = 'translateY(-200px)';
            particle.style.opacity = '0';
        });
        setTimeout(() => particle.remove(), 1000);
    }

    // Звук
    function playSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.05;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);
            audioCtx.resume();
        } catch(e) {}
    }

    // ---------- ФУНКЦИИ МАГАЗИНА ----------
    function buyEffect(effectName, price) {
        if (game.fries >= price) {
            game.fries -= price;
            game.effects[effectName] = true;
            alert(`Эффект ${effectName} активирован!`);
            updateUI();
            saveGame();
        } else {
            alert("Не хватает картошек!");
        }
    }

    function buyAutoClicker() {
        let cost = getAutoCost();
        if (game.fries >= cost) {
            game.fries -= cost;
            game.autoLevel++;
            if (game.autoLevel > 4) game.autoLevel = 4;
            updateAutoIncome();
            updateUI();
            saveGame();
        } else {
            alert("Не хватает картошек!");
        }
    }

    // ---------- ФУДКОРТ ----------
    function makeJoke() {
        const now = Date.now();
        if (now < game.jokeCooldown) {
            const minutes = Math.ceil((game.jokeCooldown - now) / 60000);
            document.getElementById('foodcourtMessage').innerText = `⏰ шутить можно раз в день. осталось ${minutes} мин.`;
            return;
        }
        const isFunny = Math.random() < 0.5;
        if (isFunny) {
            game.fries += 250;
            document.getElementById('foodcourtMessage').innerHTML = '😂 ха-ха! +250 картошек!';
        } else {
            document.getElementById('foodcourtMessage').innerHTML = '😐 ты не умеешь шутить, это не твое.';
        }
        game.jokeCooldown = now + 24 * 60 * 60 * 1000;
        updateUI();
        saveGame();
    }

    function eatFries() {
        const now = Date.now();
        if (now < game.eatCooldown) {
            const minutes = Math.ceil((game.eatCooldown - now) / 60000);
            document.getElementById('foodcourtMessage').innerText = `⏰ съесть картошку можно раз в 3 минуты. осталось ${minutes} мин.`;
            return;
        }
        game.tapLevel++;
        game.clickPower = game.tapLevel;
        document.getElementById('foodcourtMessage').innerHTML = `🍟 вкусно! уровень тапа повышен до ${game.tapLevel}`;
        game.eatCooldown = now + 3 * 60 * 1000;
        updateUI();
        saveGame();
    }

    // ---------- НАСТРОЙКИ ----------
    function setTheme(theme) {
        document.body.classList.remove('theme-warm-yellow', 'theme-warm-green', 'theme-cool-blue');
        document.body.classList.add(`theme-${theme}`);
        saveSettings();
    }
    function setFont(font) {
        document.body.classList.remove('font-normal', 'font-bold', 'font-italic', 'font-bold-italic');
        document.body.classList.add(`font-${font}`);
        saveSettings();
    }
    function saveSettings() {
        const settings = {
            theme: document.body.className.match(/theme-\w+/)?.[0] || 'theme-warm-yellow',
            font: document.body.className.match(/font-\w+/)?.[0] || 'font-normal'
        };
        localStorage.setItem('gameSettings', JSON.stringify(settings));
    }
    function loadSettings() {
        const saved = localStorage.getItem('gameSettings');
        if (saved) {
            const s = JSON.parse(saved);
            if (s.theme) document.body.className = document.body.className.replace(/theme-\w+/, s.theme);
            if (s.font) document.body.className = document.body.className.replace(/font-\w+/, s.font);
        }
    }

    // ---------- НАВИГАЦИЯ ----------
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(screenId).classList.remove('hidden');
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    window.onload = () => {
        loadGame();
        loadSettings();
        updateAutoIncome();
        updateUI();
        setInterval(() => {
            updatePassiveIncome();
            saveGame();
        }, 500);

        // Главный экран
        document.getElementById('clickArea').onclick = clickHandler;
        document.getElementById('openShopBtn').onclick = () => showScreen('shopScreen');
        document.getElementById('openFoodcourtBtn').onclick = () => showScreen('foodcourtScreen');
        document.getElementById('openSettingsBtn').onclick = () => showScreen('settingsScreen');
        document.getElementById('telegramBtn').onclick = () => window.open('https://t.me/hioly3', '_blank');

        // Магазин
        document.getElementById('backFromShop').onclick = () => showScreen('mainScreen');
        document.getElementById('buyAutoBtn').onclick = buyAutoClicker;
        document.querySelectorAll('.buyEffectBtn').forEach((btn, idx) => {
            const effects = ['crown', 'fries', 'dollar'];
            const prices = [200, 400, 500];
            btn.onclick = () => buyEffect(effects[idx], prices[idx]);
        });

        // Фудкорт
        document.getElementById('backFromFoodcourt').onclick = () => showScreen('mainScreen');
        document.getElementById('jokeBtn').onclick = makeJoke;
        document.getElementById('eatFriesBtn').onclick = eatFries;

        // Настройки
        document.getElementById('backFromSettings').onclick = () => showScreen('mainScreen');
        document.getElementById('themeYellow').onclick = () => setTheme('warm-yellow');
        document.getElementById('themeGreen').onclick = () => setTheme('warm-green');
        document.getElementById('themeBlue').onclick = () => setTheme('cool-blue');
        document.getElementById('fontNormal').onclick = () => setFont('normal');
        document.getElementById('fontBold').onclick = () => setFont('bold');
        document.getElementById('fontItalic').onclick = () => setFont('italic');
        document.getElementById('fontBoldItalic').onclick = () => setFont('bold-italic');
    };
</script>
</body>
</html>
